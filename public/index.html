<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messagerie 1v1</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Messagerie instantanee 1v1</h1>
        <p class="muted">Rooms persistantes, messages stockes, reprise apres reconnexion.</p>

        <form id="register-form" class="stack">
          <label for="username">Nom d'utilisateur</label>
          <div class="row">
            <input id="username" name="username" type="text" placeholder="alice" required />
            <button type="submit">Connexion</button>
          </div>
        </form>

        <div id="session-box" class="stack hidden">
          <div class="card">
            <div>Utilisateur courant: <strong id="current-user">-</strong></div>
            <div>ID: <span id="current-user-id">-</span></div>
          </div>

          <div class="card stack">
            <label for="target-user">Discuter avec</label>
            <select id="target-user"></select>
          </div>

          <div class="card stack">
            <h2>Messages</h2>
            <div id="messages" class="messages"></div>
            <form id="message-form" class="row">
              <input id="message-input" type="text" placeholder="Votre message" required />
              <button type="submit">Envoyer</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
